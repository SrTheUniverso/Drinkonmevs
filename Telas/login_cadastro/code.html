<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-200">
<div class="flex flex-col h-screen">
<div class="flex flex-col items-center justify-center p-6 flex-grow">
<div class="w-full max-w-sm space-y-8">
<div class="text-center">
<h1 class="text-3xl font-bold text-slate-900 dark:text-white">Bem-vindo de volta!</h1>
<p class="mt-2 text-slate-600 dark:text-slate-400">Encontre bares com um drink grátis por semana.</p>
</div>
<div class="space-y-6">
<div>
<label class="sr-only" for="email">E-mail</label>
<input autocomplete="email" class="form-input w-full rounded-DEFAULT border-0 bg-primary/10 dark:bg-primary/20 placeholder-slate-500 dark:placeholder-slate-400 text-slate-900 dark:text-white focus:ring-2 focus:ring-inset focus:ring-primary h-14 p-4" id="email" name="email" placeholder="E-mail" required="" type="email"/>
</div>
<div>
<label class="sr-only" for="password">Senha</label>
<input autocomplete="current-password" class="form-input w-full rounded-DEFAULT border-0 bg-primary/10 dark:bg-primary/20 placeholder-slate-500 dark:placeholder-slate-400 text-slate-900 dark:text-white focus:ring-2 focus:ring-inset focus:ring-primary h-14 p-4" id="password" name="password" placeholder="Senha" required="" type="password"/>
</div>
<div class="text-right">
<a class="text-sm font-medium text-primary hover:text-primary/80" href="#">Esqueceu a senha?</a>
</div>
<div>
<button class="w-full flex justify-center py-4 px-4 border border-transparent rounded-full shadow-sm text-base font-bold text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" type="submit">
                            Entrar
                        </button>
</div>
</div>
<div class="relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-300 dark:border-slate-700"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-background-light dark:bg-background-dark text-slate-500 dark:text-slate-400">Ou entre com</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="w-full inline-flex items-center justify-center py-3 px-4 border border-slate-300 dark:border-slate-700 rounded-full shadow-sm bg-background-light dark:bg-background-dark text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-primary/10">
<svg aria-hidden="true" class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"></path>
</svg>
                        Google
                    </button>
<button class="w-full inline-flex items-center justify-center py-3 px-4 border border-slate-300 dark:border-slate-700 rounded-full shadow-sm bg-background-light dark:bg-background-dark text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-primary/10">
<svg aria-hidden="true" class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
<path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.99 3.66 9.13 8.44 9.88V15.5H8.31v-3.5h2.13V9.69c0-2.12 1.26-3.29 3.21-3.29.9 0 1.83.17 1.83.17v2.99h-1.5c-1.04 0-1.38.62-1.38 1.34v1.56h3.33l-.53 3.5h-2.8V21.88C18.34 21.13 22 16.99 22 12z"></path>
</svg>
                        Facebook
                    </button>
</div>
</div>
</div>
<div class="p-6 text-center">
<p class="text-sm text-slate-600 dark:text-slate-400">
                Não tem uma conta?
                <a class="font-medium text-primary hover:text-primary/80" href="#">Cadastre-se</a>
</p>
</div>
</div>

</body></html>
