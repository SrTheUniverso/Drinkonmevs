<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<title>Stitch Design</title>
<link href="data:image/x-icon;base64," rel="icon" type="image/x-icon"/>
<link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect"/>
<link as="style" href="https://fonts.googleapis.com/css2?display=swap&amp;family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;family=Noto+Sans:wght@400;500;700;900" onload="this.rel='stylesheet'" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#ec5b13",
            "background-light": "#f8f6f6",
            "background-dark": "#221610",
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }
  </script>
<style type="text/css">
    .form-input, .form-select {
        --tw-ring-color: transparent !important;
    }
    .form-checkbox:checked {
        background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
    }
    .form-select {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23ec5b13' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="flex flex-col min-h-screen">
<header class="flex items-center p-4">
<button class="text-stone-800 dark:text-stone-200">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h1 class="flex-1 text-center text-xl font-bold text-stone-800 dark:text-stone-200 pr-8">
        Sign Up
      </h1>
</header>
<main class="flex-1 px-4 py-6">
<form class="space-y-4">
<div>
<label class="sr-only" for="full-name">Full Name</label>
<input class="form-input w-full rounded-lg border-stone-300 dark:border-stone-700 bg-background-light dark:bg-stone-900/40 text-stone-800 dark:text-stone-200 placeholder-stone-500 dark:placeholder-stone-400 py-3 px-4 focus:border-primary dark:focus:border-primary" id="full-name" placeholder="Full Name" type="text"/>
</div>
<div>
<label class="sr-only" for="email">Email</label>
<input class="form-input w-full rounded-lg border-stone-300 dark:border-stone-700 bg-background-light dark:bg-stone-900/40 text-stone-800 dark:text-stone-200 placeholder-stone-500 dark:placeholder-stone-400 py-3 px-4 focus:border-primary dark:focus:border-primary" id="email" placeholder="Email" type="email"/>
</div>
<div>
<label class="sr-only" for="password">Password</label>
<input class="form-input w-full rounded-lg border-stone-300 dark:border-stone-700 bg-background-light dark:bg-stone-900/40 text-stone-800 dark:text-stone-200 placeholder-stone-500 dark:placeholder-stone-400 py-3 px-4 focus:border-primary dark:focus:border-primary" id="password" placeholder="Password" type="password"/>
</div>
<div>
<label class="sr-only" for="dob">Date of Birth</label>
<input class="form-input w-full rounded-lg border-stone-300 dark:border-stone-700 bg-background-light dark:bg-stone-900/40 text-stone-800 dark:text-stone-200 placeholder-stone-500 dark:placeholder-stone-400 py-3 px-4 focus:border-primary dark:focus:border-primary" id="dob" placeholder="Date of Birth" type="text"/>
</div>
<div>
<label class="sr-only" for="gender">Gender</label>
<select class="form-select w-full rounded-lg border-stone-300 dark:border-stone-700 bg-background-light dark:bg-stone-900/40 text-stone-800 dark:text-stone-200 placeholder-stone-500 dark:placeholder-stone-400 py-3 px-4 focus:border-primary dark:focus:border-primary" id="gender">
<option class="text-stone-500 dark:text-stone-400" disabled="" selected="">Gender</option>
<option>Male</option>
<option>Female</option>
<option>Non-binary</option>
<option>Prefer not to say</option>
</select>
</div>
<div class="flex items-start space-x-3 pt-2">
<input class="form-checkbox h-5 w-5 rounded mt-0.5 shrink-0 border-stone-400 dark:border-stone-600 bg-transparent text-primary checked:bg-primary checked:border-primary focus:ring-primary/50 focus:ring-offset-background-light dark:focus:ring-offset-background-dark" id="terms" type="checkbox"/>
<label class="text-sm text-stone-600 dark:text-stone-400" for="terms">
            I agree to the <a class="font-semibold text-primary" href="#">Terms of Service</a> and <a class="font-semibold text-primary" href="#">Privacy Policy</a>
</label>
</div>
</form>
</main>
<footer class="px-4 py-8 space-y-4">
<button class="w-full bg-primary text-white font-bold py-4 rounded-full hover:bg-primary/90 transition-colors">
        Sign Up
      </button>
<p class="text-center text-sm text-stone-600 dark:text-stone-400">
        Already have an account? <a class="font-bold text-primary" href="#">Sign In</a>
</p>
</footer>
</div>

</body></html>
