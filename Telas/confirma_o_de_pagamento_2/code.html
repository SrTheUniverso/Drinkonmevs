<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<title>Stitch Design</title>
<link href="data:image/x-icon;base64," rel="icon" type="image/x-icon"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ec5b13",
              "background-light": "#f8f6f6",
              "background-dark": "#221610",
            },
            fontFamily: {
              "display": ["Plus Jakarta Sans"]
            },
            borderRadius: {
              "DEFAULT": "1rem",
              "lg": "2rem",
              "xl": "3rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      .form-radio:checked {
        background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='%23ec5b13' xmlns='http://www.w3.org/2000/svg'%3e%3ccircle cx='8' cy='8' r='4'/%3e%3c/svg%3e");
      }
    </style>
<style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark">
<div class="relative flex h-auto min-h-screen w-full flex-col font-display group/design-root overflow-x-hidden">
<header class="flex items-center p-4 bg-background-light dark:bg-background-dark sticky top-0 z-10">
<button class="text-stone-800 dark:text-stone-200 p-2 rounded-full">
<svg class="h-6 w-6" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 18l-6-6 6-6"></path>
</svg>
</button>
<h1 class="text-stone-900 dark:text-stone-100 text-lg font-bold flex-1 text-center pr-12">Payment Confirmation</h1>
</header>
<main class="flex-grow pb-24">
<div class="px-4 py-6">
<h2 class="text-stone-900 dark:text-stone-100 text-2xl font-bold leading-tight tracking-tight">Selected Plan</h2>
<div class="mt-4 rounded-lg bg-stone-100 dark:bg-stone-900 p-4">
<div class="flex justify-between items-center">
<p class="text-stone-800 dark:text-stone-200 text-lg font-bold">Premium Plan</p>
<p class="text-primary text-2xl font-bold">R$29,90<span class="text-stone-500 dark:text-stone-400 text-base font-medium">/mês</span></p>
</div>
<p class="text-stone-500 dark:text-stone-400 text-sm mt-1">One free drink per week at partner bars.</p>
</div>
</div>
<div class="px-4 py-6">
<h2 class="text-stone-900 dark:text-stone-100 text-2xl font-bold leading-tight tracking-tight">Payment Method</h2>
<div class="mt-4 space-y-3">
<label class="flex items-center gap-4 rounded border border-stone-300 dark:border-stone-700 p-4 has-[:checked]:border-primary has-[:checked]:bg-primary/10">
<div class="flex-grow flex items-center gap-3">
<svg class="w-6 h-6 text-stone-600 dark:text-stone-400" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<rect height="14" rx="2" width="20" x="2" y="5"></rect>
<line x1="2" x2="22" y1="10" y2="10"></line>
</svg>
<p class="text-stone-800 dark:text-stone-200 font-medium">Credit Card</p>
</div>
<input checked="" class="form-radio h-5 w-5 border-stone-400 dark:border-stone-600 bg-transparent text-transparent focus:ring-0 focus:ring-offset-0 checked:border-primary" name="payment_method" type="radio"/>
</label>
<label class="flex items-center gap-4 rounded border border-stone-300 dark:border-stone-700 p-4 has-[:checked]:border-primary has-[:checked]:bg-primary/10">
<div class="flex-grow flex items-center gap-3">
<svg class="w-6 h-6 text-stone-600 dark:text-stone-400" fill="currentColor" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
<path d="M49.2 23.3v-5H40c-.7 0-1.3-.8-1.3-1.5s.6-1.5 1.3-1.5h9.2c1.7 0 3.1 1.4 3.1 3.1v5c0 .7-.6 1.5-1.3 1.5s-1.3-.8-1.3-1.5zm-34.4 0v-5c0-1.7 1.4-3.1 3.1-3.1h9.2c.7 0 1.3.8 1.3 1.5s-.6 1.5-1.3 1.5h-9.2v5c0 .7-.6 1.5-1.3 1.5s-1.5-.8-1.5-1.5zM24.7 49c.7 0 1.3-.6 1.3-1.3v-9.2c0-.7-.6-1.3-1.3-1.3s-1.3.6-1.3 1.3v9.2c0 .7.6 1.3 1.3 1.3zm14.6 0c.7 0 1.3-.6 1.3-1.3v-9.2c0-.7-.6-1.3-1.3-1.3s-1.3.6-1.3 1.3v9.2c0 .7.6 1.3 1.3 1.3zM32 64C14.3 64 0 49.7 0 32S14.3 0 32 0s32 14.3 32 32-14.3 32-32 32zM32 4.3C16.7 4.3 4.3 16.7 4.3 32S16.7 59.7 32 59.7 59.7 47.3 59.7 32 47.3 4.3 32 4.3zm-7.3 27.5v-9.2c0-1.7 1.4-3.1 3.1-3.1h8.5c1.7 0 3.1 1.4 3.1 3.1v9.2c0 1.7-1.4 3.1-3.1 3.1h-8.5c-1.7 0-3.1-1.4-3.1-3.1zm4.3-9.2v9.2h7.2v-9.2h-7.2z"></path>
</svg>
<p class="text-stone-800 dark:text-stone-200 font-medium">Pix</p>
</div>
<input class="form-radio h-5 w-5 border-stone-400 dark:border-stone-600 bg-transparent text-transparent focus:ring-0 focus:ring-offset-0 checked:border-primary" name="payment_method" type="radio"/>
</label>
</div>
</div>
</main>
<footer class="fixed bottom-0 left-0 right-0 p-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-sm border-t border-stone-200 dark:border-stone-800">
<button class="flex w-full cursor-pointer items-center justify-center rounded-full h-12 px-5 bg-primary text-white text-base font-bold tracking-wide">
<span>Confirm Payment</span>
</button>
</footer>
</div>

</body></html>
