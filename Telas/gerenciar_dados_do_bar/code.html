<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Stitch Design</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#ec5b13",
              "background-light": "#f8f6f6",
              "background-dark": "#221610",
            },
            fontFamily: {
              display: ["Plus Jakarta Sans"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-800 dark:text-gray-200">
<div class="min-h-screen">
<header class="sticky top-0 z-10 bg-background-light dark:bg-background-dark/80 backdrop-blur-sm">
<div class="container mx-auto px-4 py-3">
<div class="flex items-center">
<button class="text-gray-800 dark:text-gray-200">
<span class="material-symbols-outlined"> arrow_back_ios_new </span>
</button>
<h1 class="flex-1 text-center text-lg font-bold">Detalhes do Bar</h1>
<div class="w-8"></div>
</div>
</div>
</header>
<main class="container mx-auto p-4 space-y-6">
<form class="space-y-6">
<div>
<label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1" for="bar-name">Nome do Bar</label>
<input class="w-full bg-primary/10 dark:bg-primary/20 border-primary/30 dark:border-primary/40 rounded-lg p-3 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 placeholder:text-gray-500 dark:placeholder:text-gray-400" id="bar-name" placeholder="e.g. The Drunken Clam" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1" for="address">Endereço</label>
<input class="w-full bg-primary/10 dark:bg-primary/20 border-primary/30 dark:border-primary/40 rounded-lg p-3 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 placeholder:text-gray-500 dark:placeholder:text-gray-400" id="address" placeholder="e.g. Rua das Palmeiras, 123" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1" for="phone">Telefone</label>
<input class="w-full bg-primary/10 dark:bg-primary/20 border-primary/30 dark:border-primary/40 rounded-lg p-3 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 placeholder:text-gray-500 dark:placeholder:text-gray-400" id="phone" placeholder="e.g. (11) 98765-4321" type="tel"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1" for="hours">Horário de Funcionamento</label>
<textarea class="w-full bg-primary/10 dark:bg-primary/20 border-primary/30 dark:border-primary/40 rounded-lg p-3 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 placeholder:text-gray-500 dark:placeholder:text-gray-400" id="hours" placeholder="e.g. Seg-Sex: 18h-02h, Sáb-Dom: 16h-04h" rows="3"></textarea>
</div>
<div>
<label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1" for="specialty">Especialidade</label>
<input class="w-full bg-primary/10 dark:bg-primary/20 border-primary/30 dark:border-primary/40 rounded-lg p-3 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 placeholder:text-gray-500 dark:placeholder:text-gray-400" id="specialty" placeholder="e.g. Cervejas Artesanais, Cocktails" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1" for="description">Descrição</label>
<textarea class="w-full bg-primary/10 dark:bg-primary/20 border-primary/30 dark:border-primary/40 rounded-lg p-3 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 placeholder:text-gray-500 dark:placeholder:text-gray-400" id="description" placeholder="Descreva o ambiente e o que torna seu bar único..." rows="4"></textarea>
</div>
</form>
<div>
<h2 class="text-lg font-bold mb-3">Imagens</h2>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
<div class="relative group aspect-square">
<img alt="Imagem do bar 1" class="w-full h-full object-cover rounded-lg" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCaB7mb9n-9I8QvzEJY7slSzLZ25ozK54sxMDkkbuiLHZd-4b5bEE7rql4YJkfsXWgUsM1OceHK79K6Jnn4xTKFxpBZUtRGtifVgOA8YGB0jZ8jm5GhzAkgKjfl-Iafqm7TdtFlMYWV3RcLyHT-fAUFLBJfWablAodrlEZdSQyHzcVSX0-dxhOITD4JcrlTOWEtBwkIOqcYWRUdpSMv8qMJGQ8v88MN4yKO52DJ-ckB59Gzz_QmyttFU2y3xojRzFMOkfaXaEzj1dw"/>

<button class="text-white">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
</div>
<div class="relative group aspect-square">
<img alt="Imagem do bar 2" class="w-full h-full object-cover rounded-lg" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBnJqHz_3uLhEPCriWptSAHd_FVgxEAfNHUJBmxq9ZFikylAsbZ54Blnh0P8XbhmOhEqmMFmATUZ2SmsAKEmpHZMNHyl2wg2b_xSEyzIldGCLA4ODZ5VwRIMHS5J07oWcjh0JR9xhNW0q6un2bpz8qN2SJhhSQE97pNav4uoySB556PqlGCCjWideJMr6nuQibJ53qog-5lx3Lg6OSYjmrZ2MoYdme5JGJxAA8O8yvcsHePA9z7mZEflOJkHGePCSIjN6hufHY21FM"/>
<div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity rounded-lg">
<button class="text-white">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
</div>
<div class="relative group aspect-square">
<img alt="Imagem do bar 3" class="w-full h-full object-cover rounded-lg" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAGa2cYeuIUfu5y5Ilv16B53hgeOy3rPnK_ZiewJpWo35PExBrm7uO55HcM7S-vdTUgr9YAV2_0v-sUEiwd8Q8AZw7zRaMnNhpe9KxdlnbO-A_y21P6YlDl5W5G8tIyq8I93DH1983MxQPSuybpPKhNTicpwI0byEK0QSQmzsIARZjBw2TT-cXWwrAL05Tml4OBF0kQ-Vv5XE3JCqtY9ZbnBv85QBLbU5JOvj7URjF5SQXFz05gEDv7W9KbPjxfqw2XD15rffqL9WA"/>
<div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity rounded-lg">
<button class="text-white">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
</div>
<button class="aspect-square flex items-center justify-center border-2 border-dashed border-primary/50 dark:border-primary/60 rounded-lg text-primary/80 dark:text-primary/70 hover:bg-primary/10 dark:hover:bg-primary/20 transition-colors">
<div class="text-center">
<span class="material-symbols-outlined text-4xl">add_photo_alternate</span>
<p class="text-xs mt-1">Adicionar</p>
</div>
</button>
</div>
</div>
<div class="pt-6 pb-4">
<button class="w-full bg-primary text-white font-bold py-3 px-5 rounded-lg hover:bg-primary/90 transition-colors shadow-lg shadow-primary/30">
            Salvar Alterações
          </button>
</div>
</main>
</div>

</body></html>
