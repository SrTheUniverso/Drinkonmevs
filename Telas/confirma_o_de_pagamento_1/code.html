<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<title>Stitch Design</title>
<link href="data:image/x-icon;base64," rel="icon" type="image/x-icon"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#ec5b13",
            "background-light": "#f8f6f6",
            "background-dark": "#221610",
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans"]
          },
          borderRadius: {
            "DEFAULT": "1rem",
            "lg": "2rem",
            "xl": "3rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .form-radio:checked {
      background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='%23ec5b13' xmlns='http://www.w3.org/2000/svg'%3e%3ccircle cx='8' cy='8' r='4'/%3e%3c/svg%3e");
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark">
<div class="relative flex h-auto min-h-screen w-full flex-col font-display group/design-root overflow-x-hidden">
<header class="flex items-center p-4 bg-background-light dark:bg-background-dark sticky top-0 z-10">
<button class="text-stone-800 dark:text-stone-200 p-2 rounded-full">
<svg fill="currentColor" height="24" viewBox="0 0 256 256" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M205.66,194.34a8,8,0,0,1-11.32,11.32L128,139.31,61.66,205.66a8,8,0,0,1-11.32-11.32L116.69,128,50.34,61.66A8,8,0,0,1,61.66,50.34L128,116.69l66.34-66.35a8,8,0,0,1,11.32,11.32L139.31,128Z"></path>
</svg>
</button>
<h1 class="text-stone-900 dark:text-stone-100 text-lg font-bold flex-1 text-center pr-12">Upgrade Plan</h1>
</header>
<main class="flex-grow pb-24">
<div class="px-4 py-6">
<h2 class="text-stone-900 dark:text-stone-100 text-2xl font-bold leading-tight tracking-tight">Plan Summary</h2>
<div class="mt-4 flex items-center gap-4">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-lg size-16" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCqc4Z9xHHWZUw2NQFA5na-SJMoEzthPCdDX69JZKJ3hWkasEAWIySN4fX0tBApR1ntboFN4B_TMCrYBywToKcXIoHZB5eiYJh6vg5ogq4EfL-Ov9YyHIWxKx1T6hl8UdRU5HjI3JM5IJsQYuHq9WVRaKHB8WDeKzNrkD9-FTlVW41YtErq9A7q5VhrnQbhSH14e5-RzG-_7cczP77E_2UDgs2W2WIoaFq_tzcaRoGKtV1BuMg93X3qkhtYES3ZtLADCitPnhSH46g");'></div>
<div class="flex flex-col">
<p class="text-stone-800 dark:text-stone-200 text-lg font-medium">Bar Name</p>
<p class="text-stone-500 dark:text-stone-400 text-sm">Premium Plan</p>
</div>
</div>
<div class="mt-6 space-y-3 text-sm">
<div class="flex justify-between">
<p class="text-stone-500 dark:text-stone-400">Plan</p>
<p class="text-stone-800 dark:text-stone-200 font-medium">Premium</p>
</div>
<div class="flex justify-between">
<p class="text-stone-500 dark:text-stone-400">Price</p>
<p class="text-stone-800 dark:text-stone-200 font-medium">$99.99</p>
</div>
<div class="flex justify-between">
<p class="text-stone-500 dark:text-stone-400">Duration</p>
<p class="text-stone-800 dark:text-stone-200 font-medium">1 month</p>
</div>
</div>
</div>
<div class="px-4 py-6">
<h2 class="text-stone-900 dark:text-stone-100 text-2xl font-bold leading-tight tracking-tight">Payment Method</h2>
<div class="mt-4 space-y-3">
<label class="flex items-center gap-4 rounded border border-stone-300 dark:border-stone-700 p-4 has-[:checked]:border-primary has-[:checked]:bg-primary/10">
<div class="flex-grow">
<p class="text-stone-800 dark:text-stone-200 font-medium">Credit Card</p>
</div>
<input checked="" class="form-radio h-5 w-5 border-stone-400 dark:border-stone-600 bg-transparent text-transparent focus:ring-0 focus:ring-offset-0 checked:border-primary" name="payment_method" type="radio"/>
</label>
<label class="flex items-center gap-4 rounded border border-stone-300 dark:border-stone-700 p-4 has-[:checked]:border-primary has-[:checked]:bg-primary/10">
<div class="flex-grow">
<p class="text-stone-800 dark:text-stone-200 font-medium">Bank Transfer</p>
</div>
<input class="form-radio h-5 w-5 border-stone-400 dark:border-stone-600 bg-transparent text-transparent focus:ring-0 focus:ring-offset-0 checked:border-primary" name="payment_method" type="radio"/>
</label>
</div>
</div>
<div class="px-4 py-6 space-y-4">
<div>
<label class="sr-only" for="card-number">Card Number</label>
<input class="form-input flex w-full rounded border-stone-300 dark:border-stone-700 bg-stone-100 dark:bg-stone-900 h-14 placeholder:text-stone-500 dark:placeholder:text-stone-400 p-4 text-base font-normal text-stone-900 dark:text-stone-100 focus:ring-primary focus:border-primary" id="card-number" placeholder="Card Number"/>
</div>
<div class="flex gap-4">
<div class="flex-1">
<label class="sr-only" for="expiry-date">Expiry Date</label>
<input class="form-input flex w-full rounded border-stone-300 dark:border-stone-700 bg-stone-100 dark:bg-stone-900 h-14 placeholder:text-stone-500 dark:placeholder:text-stone-400 p-4 text-base font-normal text-stone-900 dark:text-stone-100 focus:ring-primary focus:border-primary" id="expiry-date" placeholder="MM/YY"/>
</div>
<div class="flex-1">
<label class="sr-only" for="cvv">CVV</label>
<input class="form-input flex w-full rounded border-stone-300 dark:border-stone-700 bg-stone-100 dark:bg-stone-900 h-14 placeholder:text-stone-500 dark:placeholder:text-stone-400 p-4 text-base font-normal text-stone-900 dark:text-stone-100 focus:ring-primary focus:border-primary" id="cvv" placeholder="CVV"/>
</div>
</div>
<div>
<label class="sr-only" for="cardholder-name">Cardholder Name</label>
<input class="form-input flex w-full rounded border-stone-300 dark:border-stone-700 bg-stone-100 dark:bg-stone-900 h-14 placeholder:text-stone-500 dark:placeholder:text-stone-400 p-4 text-base font-normal text-stone-900 dark:text-stone-100 focus:ring-primary focus:border-primary" id="cardholder-name" placeholder="Cardholder Name"/>
</div>
</div>
</main>
<footer class="fixed bottom-0 left-0 right-0 p-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-sm border-t border-stone-200 dark:border-stone-800">
<button class="flex w-full cursor-pointer items-center justify-center rounded-full h-12 px-5 bg-primary text-white text-base font-bold tracking-wide">
<span>Confirm Payment</span>
</button>
</footer>
</div>

</body></html>
